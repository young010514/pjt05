<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}금융 자산 커뮤니티{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #0d9488;
      --color-primary-hover: #0f766e;
      --color-primary-light: #ccfbf1;
      --color-secondary: #64748b;
      --color-secondary-hover: #475569;
      --color-danger: #dc2626;
      --color-danger-hover: #b91c1c;
      --color-bg: #f8fafc;
      --color-bg-card: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.06);
      --radius: 8px;
      --radius-btn: 6px;
      --transition: 0.2s ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .app-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      padding: 1rem 0;
      margin-bottom: 0;
      box-shadow: var(--shadow-sm);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .header a {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--color-text);
      text-decoration: none;
      transition: color var(--transition);
      letter-spacing: -0.02em;
    }

    .header a:hover {
      color: var(--color-primary);
      text-decoration: none;
    }

    .main {
      flex: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
      width: 100%;
    }

    .container {
      background: var(--color-bg-card);
      padding: 1.75rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
    }

    a {
      color: var(--color-primary);
      text-decoration: none;
      transition: color var(--transition);
    }

    a:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }

    /* 버튼 통일 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.5;
      border-radius: var(--radius-btn);
      border: none;
      cursor: pointer;
      transition: background-color var(--transition), color var(--transition), transform var(--transition), box-shadow var(--transition);
      text-decoration: none;
      background: var(--color-primary);
      color: #fff;
    }

    .btn:hover,
    a.btn:hover {
      background: var(--color-primary-hover);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--color-secondary);
      color: #fff;
    }

    .btn-secondary:hover,
    a.btn-secondary:hover {
      background: var(--color-secondary-hover);
      color: #fff;
    }

    .btn-danger {
      background: var(--color-danger);
      color: #fff;
    }

    .btn-danger:hover,
    button.btn-danger:hover {
      background: var(--color-danger-hover);
      color: #fff;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    /* 페이지 타이틀·브레드크럼 */
    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.02em;
    }

    .breadcrumb {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      margin-bottom: 1.25rem;
    }

    .breadcrumb a {
      color: var(--color-text-muted);
    }

    .breadcrumb a:hover {
      color: var(--color-primary);
    }

    .text-muted {
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }

    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-0 { margin-bottom: 0; }

    /* 알림 메시지 */
    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 1.25rem 0;
    }

    .messages li {
      padding: 0.75rem 1rem;
      background: #fef2f2;
      color: var(--color-danger);
      border-radius: var(--radius-btn);
      border: 1px solid #fecaca;
      font-size: 0.875rem;
      animation: messageIn 0.3s ease;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 카드형 리스트 공통 (hover) */
    .card-item {
      padding: 1rem 1.25rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-bg-card);
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .card-item:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .card-item a {
      font-weight: 600;
    }

    /* 폼 공통 */
    input[type="text"],
    textarea {
      font-family: inherit;
      font-size: 0.9375rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-btn);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    label {
      font-weight: 500;
      font-size: 0.875rem;
      display: block;
      margin-bottom: 0.375rem;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>

<body>
  <div class="app-wrap">
    <header class="header">
      <div class="header-inner">
        <a href="{% url 'community:asset_list' %}">🏦 금융 자산 커뮤니티</a>
      </div>
    </header>
    <main class="main">
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>

</html>
